<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Tag</title>
</head>
<body>
    <!--
    1. Text Formatting Tag :
        Those tags which format the text, is considered as Text Formatting Tag.
        1. Bold -> <strong>
        2. Italic -> <em>
        3. underline -> <u>  <ins>
        4. highlights -> <mark>
        5. strikethrough -> <strike> 
        6. superscript -> <sup>
        7. subscript -> <sub>
        8. abbrevation (to show the tool tip when cursor goes to particular icon it will describe it.) -> <abbr> , <acronym>
        9. Big -> <big>
        10. Small -> <small>
        11. <pre> -> for monospace font, and print it as it is.
        12. for scrolling -> <marquee >
        
    -->
<!-- 
    <p><mark>Hello</mark> <u>Everyone</u> we <em>are</em> web <b>developer</b></p>
    <p>2<sup>3</sup></p>
    <abbr title="Learn HTML">HTML</abbr>
    <p></p>

    <marquee direction="right" scrollamount="50" behaviour="slide">Ashish</marquee> -->
    <p><strike>Helllo</strike> <u>My</u> <em>name</em> is <strong><mark><big>ashish</big></mark></strong></p>

    <p>H<sub>2</sub>O</p>

    <p>20<sup>3</sup></p>
    <acronym title="Ashish">Name</acronym>

    <pre>Console </pre>

    <marquee direction="right" scrollamount=100 behavior="alternate">Ashish</marquee>
</body>
</html>
